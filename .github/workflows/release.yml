name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release jars
        run: ./gradlew :mc1.21.8:build :mc1.21.11:build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bingo-parachute-jars
          path: |
            mc1.21.8/build/libs/*.jar
            mc1.21.11/build/libs/*.jar

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mc1.21.8/build/libs/*.jar
            mc1.21.11/build/libs/*.jar

      - name: Publish to Modrinth
        if: startsWith(github.ref, 'refs/tags/') && vars.MODRINTH_PROJECT_ID != ''
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: true
          files: |
            mc1.21.8/build/libs/*.jar
            !mc1.21.8/build/libs/*-sources.jar
            mc1.21.11/build/libs/*.jar
            !mc1.21.11/build/libs/*-sources.jar
          name: Bingo Parachute ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          changelog: |
            Release ${{ github.ref_name }}

            See the GitHub release notes for the full changelog:
            https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
