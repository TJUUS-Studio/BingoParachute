name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Capture tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release jars
        run: ./gradlew :mc1.21.8:build :mc1.21.11:build

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            mc1.21.8/build/libs/*.jar
            mc1.21.11/build/libs/*.jar
          retention-days: 1

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mc1.21.8/build/libs/*.jar
            mc1.21.11/build/libs/*.jar

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && vars.MODRINTH_PROJECT_ID != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc_version: "1.21.8"
            module: "mc1.21.8"
            featured: false
          - mc_version: "1.21.11"
            module: "mc1.21.11"
            featured: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/artifacts

      - name: Filter artifact for current MC version
        run: |
          mkdir -p build/filtered
          find build/artifacts -name "*+${{ matrix.module }}.jar" -not -name "*-sources.jar" -exec cp {} build/filtered/ \;
          echo "Filtered artifacts:"
          ls -la build/filtered

      - name: Publish to Modrinth (matrix)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: ${{ matrix.featured }}
          files: build/filtered/*.jar
          name: Bingo Parachute ${{ needs.build.outputs.tag }} (MC ${{ matrix.mc_version }})
          version: ${{ needs.build.outputs.tag }}+${{ matrix.module }}
          version-type: release
          loaders: fabric
          game-versions: |
            ${{ matrix.mc_version }}
          changelog: |
            Release ${{ needs.build.outputs.tag }} for Minecraft ${{ matrix.mc_version }}.

            See the GitHub release notes for the full changelog:
            https://github.com/${{ github.repository }}/releases/tag/${{ needs.build.outputs.tag }}
